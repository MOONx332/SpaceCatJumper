<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="icon" href="assets/img/pixelspacecat.png">
    <script src="assets/js/app.js" defer></script>

    <title>Space Cat Jumper</title>
</head>
<body>
    <div id="menu">
        <h1 id="headerdiv">SPACE CAT JUMPER</h1>
        <button id="menubutton">PLAY</button>
    </div>

    <button id="playb">RESTART</button>

    <img id="plr" src="assets/img/pixelspacecat1fix.png" alt="You!">
    <img id="moon" src="assets/img/pixelmoon.png" alt="Shining Moon!">

    <img id="ground" src="assets/img/pixelground.png" alt="">

    <img id="hp1" src="assets/img/pixelheart.png" alt="heart">
    <img id="hp2" src="assets/img/pixelheart.png" alt="heart2">
    <img id="hp3" src="assets/img/pixelheart.png" alt="heart3">

    <img id="spike" src="assets/img/pixelspike.png" alt="DANGER DON'T TOUCH THIS">
    <img id="meto" src="assets/img/pixelmetoframe1.png" alt="FAST AS LIGHTNING RAHHHHHH">

    <img id="cog" src="assets/img/pixelcogbutton.png" alt="Settings/Pause">

    <div id="cogdiv">
        <h1 id="textcog">Game is paused!</h1>

        <img id="muteb" src="assets/img/pixelmutebutton.png" alt="Mute the game">
    </div>

    <h1 id="highscoret">HIGHSCORE 0</h1>
    <h1 id="scoret">SCORE 0</h1>

    <audio id="beep" src="assets/sound/8bitbeep.mp3"></audio>
    <audio id="death" src="assets/sound/death8bit.mp3"></audio>
    <audio id="death2" src="assets/sound/death8bitmusicshort.mp3"></audio>
    <audio id="click" src="assets/sound/retro-click-236673.mp3"></audio>
    <audio id="reward" src="assets/sound/reward8bitbeep.mp3"></audio>
    <audio id="jump" src="assets/sound/coin-collect-retro-8-bit-sound-effect-145251.mp3"></audio>
    <audio id="st" src="assets/sound/experimental-8-bit-sound-270302.mp3"></audio>

    <audio id="music1" src="assets/sound/my-8-bit-hero-301280.mp3"></audio>
    <audio id="music2" src="assets/sound/the-return-of-the-8-bit-era-301292.mp3"></audio>
    <audio id="music3" src="assets/sound/fun-with-my-8-bit-game-301278.mp3"></audio>
</body>
</html>
